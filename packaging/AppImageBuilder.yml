# AppImage build recipe for appimage-builder
# Install: pip install appimage-builder
# Run from repo root: appimage-builder --recipe packaging/AppImageBuilder.yml

version: 1
name: geopulse
script: |
  # Install Python deps into AppDir
  pip3 install --target AppDir/usr/lib/geopulse/vendor -r requirements.txt
  # Copy app
  mkdir -p AppDir/usr/lib/geopulse
  cp -r *.py version.py analysis data providers scraping storage ui ollama_manager.py AppDir/usr/lib/geopulse/
  # Launcher (avoid bare colons in YAML by using printf)
  mkdir -p AppDir/usr/bin
  printf '%s\n' '#!/usr/bin/env python3' 'import os, sys' 'os.chdir("/usr/lib/geopulse")' 'sys.path.insert(0, "/usr/lib/geopulse")' 'sys.path.insert(0, "/usr/lib/geopulse/vendor")' 'from main import main' 'main()' > AppDir/usr/bin/geopulse
  chmod +x AppDir/usr/bin/geopulse
AppDir:
  path: AppDir
  app_info:
    id: io.geopulse.app
    name: GeoPulse
    icon: utilities-terminal  # placeholder; add a .png icon to the repo and reference it
    version: '0.90.2'
    exec: usr/bin/geopulse
  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble main
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3B4FE6ACC0B21F32
    packages:
      - python3
      - python3-gi
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libnotify-bin
